<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>MIDI Note Transition Graph</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <style>
      body {
        background-color: black;
        color: white;
      }
      h1 {
        text-align: center;
        margin-top: 50px;
      }
      .container {
        margin-top: 50px;
      }
      #graph {
        width: 100%;
        height: 600px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>MIDI Note Transition Graph</h1>
      <div id="graph"></div>
    </div>
    <script src="https://d3js.org/d3.v6.min.js"></script>
    <script>
      const width = document.getElementById('graph').offsetWidth;
      const height = document.getElementById('graph').offsetHeight;

      const svg = d3.select("#graph").append("svg")
                    .attr("width", width)
                    .attr("height", height);

      const color = d3.scaleOrdinal(d3.schemeCategory10);

      d3.json("{{ url_for('data_file', filename=filename) }}").then(graph => {
        const simulation = d3.forceSimulation(graph.nodes)
                              .force("link", d3.forceLink(graph.links).id(d => d.id).distance(100))
                              .force("charge", d3.forceManyBody().strength(-300))
                              .force("center", d3.forceCenter(width / 2, height / 2));

        const link = svg.append("g")
                        .attr("class", "links")
                        .selectAll("line")
                        .data(graph.links)
                        .enter().append("line")
                        .attr("stroke-width", d => Math.sqrt(d.value))
                        .attr("stroke", "#999")
                        .attr("stroke-opacity", 0.6);

        const node = svg.append("g")
                        .attr("class", "nodes")
                        .selectAll("circle")
                        .data(graph.nodes)
                        .enter().append("circle")
                        .attr("r", 10)
                        .attr("fill", d => color(d.id))
                        .call(d3.drag()
                              .on("start", dragstarted)
                              .on("drag", dragged)
                              .on("end", dragended));

        node.append("title")
            .text(d => d.id);

        const label = svg.append("g")
                         .attr("class", "labels")
                         .selectAll("text")
                         .data(graph.nodes)
                         .enter().append("text")
                         .attr("dy", -3)
                         .attr("dx", 12)
                         .attr("fill", "white")
                         .text(d => d.id);

        simulation.on("tick", () => {
          link.attr("x1", d => d.source.x)
              .attr("y1", d => d.source.y)
              .attr("x2", d => d.target.x)
              .attr("y2", d => d.target.y);

          node.attr("cx", d => d.x)
              .attr("cy", d => d.y);

          label.attr("x", d => d.x)
               .attr("y", d => d.y);
        });

        function dragstarted(event, d) {
          if (!event.active) simulation.alphaTarget(0.3).restart();
          d.fx = d.x;
          d.fy = d.y;
        }

        function dragged(event, d) {
          d.fx = event.x;
          d.fy = event.y;
        }

        function dragended(event, d) {
          if (!event.active) simulation.alphaTarget(0);
          d.fx = null;
          d.fy = null;
        }
      }).catch(error => {
        console.error('Error loading graph data:', error);
      });
    </script>
  </body>
</html>
